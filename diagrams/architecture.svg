<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg">
<title>ThirdLine 5-layer system architecture</title>
<style>
rect { fill: #0A1628; stroke: #1A2E4A; }
text { font-family: system-ui, sans-serif; fill: #E8EDF5; }
.label { font-size: 11px; fill: #7A92B4; }
.title { font-size: 13px; font-weight: 600; }
.layer-purple { fill: #1e1a3a; stroke: #534AB7; }
.layer-teal   { fill: #0a1f1a; stroke: #0F6E56; }
.layer-blue   { fill: #0a1628; stroke: #185FA5; }
.layer-amber  { fill: #1f1200; stroke: #854F0B; }
.layer-coral  { fill: #1f0a06; stroke: #993C1D; }
.sub-blue     { fill: #0f1f38; stroke: #185FA5; }
.sub-coral    { fill: #2a1008; stroke: #993C1D; }
.hitl         { fill: none; stroke: #E24B4A; stroke-dasharray: 4 3; }
.hitl-text    { fill: #E24B4A; font-size: 11px; }
.conn         { fill: none; stroke: #3A5470; }
.lbl          { fill: #534AB7; font-size: 11px; }
</style>
<rect x="40" y="30" width="600" height="68" rx="10" class="layer-purple" stroke-width="0.5"/>
<text class="title" x="340" y="56" text-anchor="middle" dominant-baseline="central">Interface layer</text>
<text class="label" x="340" y="76" text-anchor="middle" dominant-baseline="central">React dashboard · FastAPI 17 endpoints · GitHub Actions CI · Examiner Pack</text>

<rect x="40" y="122" width="600" height="68" rx="10" class="layer-teal" stroke-width="0.5"/>
<text class="title" x="340" y="148" text-anchor="middle" dominant-baseline="central">Platform intelligence layer</text>
<text class="label" x="340" y="168" text-anchor="middle" dominant-baseline="central">AuditCopilot · CCM · Regulatory Radar · Pipeline Auditor · Knowledge Graph · Shield</text>

<rect x="40" y="214" width="600" height="100" rx="10" class="layer-blue" stroke-width="0.5"/>
<text class="title" x="340" y="240" text-anchor="middle" dominant-baseline="central">Agentic audit engine (Google ADK pattern)</text>

<rect x="58" y="272" width="100" height="32" rx="6" class="sub-blue" stroke-width="0.5"/>
<text class="label" x="108" y="289" text-anchor="middle" dominant-baseline="central">Inventory</text>
<rect x="170" y="272" width="100" height="32" rx="6" class="sub-blue" stroke-width="0.5"/>
<text class="label" x="220" y="289" text-anchor="middle" dominant-baseline="central">Evidence</text>
<rect x="282" y="272" width="116" height="32" rx="6" class="sub-blue" stroke-width="0.5"/>
<text class="label" x="340" y="289" text-anchor="middle" dominant-baseline="central">Evaluation</text>
<rect x="410" y="272" width="110" height="32" rx="6" class="sub-blue" stroke-width="0.5"/>
<text class="label" x="465" y="289" text-anchor="middle" dominant-baseline="central">Ctrl mapping</text>
<rect x="532" y="272" width="100" height="32" rx="6" class="sub-blue" stroke-width="0.5"/>
<text class="label" x="582" y="289" text-anchor="middle" dominant-baseline="central">Workpaper</text>

<rect x="240" y="324" width="200" height="28" rx="6" class="hitl" stroke-width="1"/>
<text class="hitl-text" x="340" y="339" text-anchor="middle" dominant-baseline="central">HITL gate — human approval required</text>

<rect x="40" y="374" width="600" height="68" rx="10" class="layer-amber" stroke-width="0.5"/>
<text class="title" x="340" y="400" text-anchor="middle" dominant-baseline="central">Data layer</text>
<text class="label" x="340" y="420" text-anchor="middle" dominant-baseline="central">Pub/Sub · Apache Beam · BigQuery 8 tables · dbt transforms</text>

<rect x="40" y="466" width="600" height="100" rx="10" class="layer-coral" stroke-width="0.5"/>
<text class="title" x="340" y="492" text-anchor="middle" dominant-baseline="central">Bank AI agent fleet</text>
<rect x="58" y="510" width="100" height="28" rx="6" class="sub-coral" stroke-width="0.5"/>
<text class="label" x="108" y="525" text-anchor="middle" dominant-baseline="central">mortgage-faq</text>
<rect x="170" y="510" width="100" height="28" rx="6" class="sub-coral" stroke-width="0.5"/>
<text class="label" x="220" y="525" text-anchor="middle" dominant-baseline="central">kyc-summary</text>
<rect x="282" y="510" width="116" height="28" rx="6" class="sub-coral" stroke-width="0.5"/>
<text class="label" x="340" y="525" text-anchor="middle" dominant-baseline="central">lending-decision</text>
<rect x="410" y="510" width="100" height="28" rx="6" class="sub-coral" stroke-width="0.5"/>
<text class="label" x="460" y="525" text-anchor="middle" dominant-baseline="central">fx-posttrade</text>
<rect x="522" y="510" width="110" height="28" rx="6" class="sub-coral" stroke-width="0.5"/>
<text class="label" x="577" y="525" text-anchor="middle" dominant-baseline="central">compliance-qa</text>

<line x1="340" y1="566" x2="340" y2="444" stroke="#854F0B" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
<line x1="340" y1="374" x2="340" y2="352" stroke="#185FA5" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
<line x1="340" y1="314" x2="340" y2="200" stroke="#185FA5" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
<line x1="340" y1="122" x2="340" y2="100" stroke="#0F6E56" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5"/></marker></defs>
</svg>
